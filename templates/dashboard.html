<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f7f5;
        }

        .card{
            transition:.3s;
            border:none;
        }

        .card:hover{
            transform:scale(1.05);
        }
    </style>

</head>
<body>

<nav class="navbar navbar-dark bg-success">

<div class="container">

<h3 class="text-white">
🌾 Digital Farming Dashboard
</h3>

<div>

<span class="text-white me-3">

Welcome,
<b>{{ user }}</b>

</span>

<a href="/logout" class="btn btn-danger">
Logout
</a>

</div>

</div>

</nav>

<div class="container mt-5">

<div class="row g-4">

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h1>🌦</h1>

<h4>Weather</h4>

<a href="/weather" class="btn btn-success">
Open
</a>

</div>

</div>

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h1>🌱</h1>

<h4>Crop Recommendation</h4>

<a href="/crops" class="btn btn-success">
Open
</a>

</div>

</div>

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h1>📒</h1>

<h4>Farm Diary</h4>

<a href="/diary" class="btn btn-success">
Open
</a>

</div>

</div>

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h1>📢</h1>

<h4>Government Schemes</h4>

<a href="/schemes" class="btn btn-success">
Open
</a>

</div>

</div>

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h1>💡</h1>

<h4>Farming Tips</h4>

<a href="/tips" class="btn btn-success">
Open
</a>

</div>

</div>

<div class="col-md-4">

<div class="card shadow p-4 text-center">

<h1>🧮</h1>

<h4>Fertilizer Calculator</h4>

<a href="/fertilizer" class="btn btn-success">
Open
</a>

</div>

</div>

</div>

</div>

</body>
</html>
