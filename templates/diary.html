<!DOCTYPE html>
<html>

<head>

<title>Farm Diary</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-success">

📒 Farm Diary

</h2>

<form method="POST">

<label>Activity</label>

<input
type="text"
name="activity"
class="form-control"
required>

<br>

<label>Expense (₹)</label>

<input
type="number"
name="expense"
class="form-control"
required>

<br>

<label>Date</label>

<input
type="date"
name="date"
class="form-control"
required>

<br>

<button class="btn btn-success">

Save Entry

</button>

</form>

<hr>

<h3>Your Records</h3>

<table class="table table-bordered">

<tr>

<th>Date</th>

<th>Activity</th>

<th>Expense</th>

</tr>

{% for record in records %}

<tr>

<td>{{ record.date }}</td>

<td>{{ record.activity }}</td>

<td>₹ {{ record.expense }}</td>

</tr>

{% endfor %}

</table>

<a href="/dashboard" class="btn btn-secondary">

Back

</a>

</div>

</div>

</body>

</html>
