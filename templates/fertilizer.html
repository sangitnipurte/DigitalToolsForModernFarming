<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fertilizer Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-5">

<h2 class="text-success text-center">

🧮 Fertilizer Calculator

</h2>

<form method="POST">

<label class="form-label mt-3">

Select Crop

</label>

<select
name="crop"
class="form-select"
required>

<option value="">Choose Crop</option>

<option>Rice</option>
<option>Wheat</option>
<option>Cotton</option>
<option>Sugarcane</option>
<option>Maize</option>

</select>

<label class="form-label mt-3">

Land Area (Acres)

</label>

<input
type="number"
step="0.1"
name="area"
class="form-control"
required>

<br>

<button class="btn btn-success w-100">

Calculate

</button>

</form>

{% if result %}

<hr>

<div class="alert alert-success">

<h3>🌾 Recommendation</h3>

<p><strong>Crop:</strong> {{ result.crop }}</p>

<p><strong>Land Area:</strong> {{ result.area }} Acres</p>

<table class="table table-bordered">

<tr>

<th>Fertilizer</th>

<th>Quantity</th>

</tr>

<tr>

<td>Urea</td>

<td>{{ result.urea }} kg</td>

</tr>

<tr>

<td>DAP</td>

<td>{{ result.dap }} kg</td>

</tr>

<tr>

<td>Potash</td>

<td>{{ result.potash }} kg</td>

</tr>

</table>

</div>

{% endif %}

<a href="/dashboard" class="btn btn-secondary">

Back to Dashboard

</a>

</div>

</div>

</body>

</html>
